name: Update commit stats

on:
  schedule:
    - cron: "0 6 * * *"   # todo dia às 06:00 UTC
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch contribution total
        env:
          GH_TOKEN: ${{ secrets.COMMIT_STATS_TOKEN }}
        run: |
          RESPONSE=$(curl -s -H "Authorization: bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { viewer { contributionsCollection { contributionCalendar { totalContributions } } } } "}' \
            https://api.github.com/graphql)

          TOTAL=$(echo "$RESPONSE" | jq -r '.data.viewer.contributionsCollection.contributionCalendar.totalContributions')

          mkdir -p src/data
          echo "{\"total\": $TOTAL, \"updatedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > src/data/commit-stats.json

      - name: Commit if changed
        run: |
          git config user.name "commit-stats-bot"
          git config user.email "actions@github.com"
          git add src/data/commit-stats.json
          git diff --staged --quiet || git commit -m "chore: update commit stats [skip ci]"
          git push